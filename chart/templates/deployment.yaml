apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "multitarget-poem.fullname" . }}
  labels:
    {{- include "multitarget-poem.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "multitarget-poem.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "multitarget-poem.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
